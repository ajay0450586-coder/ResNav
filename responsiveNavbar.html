<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Responsive Navbar</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <link rel="stylesheet" href="responsiveNavbar.css" />
  </head>

  <body>
    <header>
      <nav class="navbar">
        <a href="#home" class="logo">
          <i class="fa-solid fa-code"></i>
          DevStudio
        </a>

        <ul class="nav-menu">
          <li><a href="#home" class="active">Home</a></li>

          <li><a href="#services">Services</a></li>

          <li><a href="#portfolio">Portfolio</a></li>

          <li><a href="#pricing">Pricing</a></li>

          <li><a href="#contact">Contact</a></li>
        </ul>

        <a href="#" class="btn">Get Started</a>

        <div class="menu-btn">
          <i class="fa-solid fa-bars"></i>
        </div>
      </nav>
    </header>

    <section id="home" class="hero">
      <div class="hero-content">
        <h1>Build Amazing Websites</h1>

        <p>Create modern responsive websites with HTML, CSS and JavaScript.</p>

        <a href="#services" class="hero-btn">Explore More</a>
      </div>
    </section>

    <section id="services" class="section">
      <h2>Services</h2>
    </section>

    <section id="portfolio" class="section">
      <h2>Portfolio</h2>
    </section>

    <section id="pricing" class="section">
      <h2>Pricing</h2>
    </section>

    <section id="contact" class="section">
      <h2>Contact</h2>
    </section>

    <script src="responsiveNavbar.js"></script>
  </body>
</html>
